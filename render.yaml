# Deploy ET Scout on Render (https://render.com) — free tier available.
# Streamlit Community Cloud cannot host this app (React + FastAPI stack).
#
# 1. Push repo to GitHub
# 2. Render → New → Web Service → connect sunilmukkath/ET_Spirex
# 3. Runtime: Docker | Branch: main
# 4. Add environment variables (see backend/.env.example)
# 5. Production URL: https://et-spirex.onrender.com/

services:
  - type: web
    name: et-spirex
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: LIMESURVEY_URL
        sync: false
      - key: LIMESURVEY_USERNAME
        sync: false
      - key: LIMESURVEY_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "https://et-spirex.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_SUCCESS_URL
        sync: false
      - key: GOOGLE_AUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_AUTH_SUCCESS_URL
        sync: false
      - key: APP_PUBLIC_URL
        value: "https://et-spirex.onrender.com"
      - key: GMAIL_TEAM_EMAIL_MAP
        sync: false
      - key: SUPER_ADMIN_EMAIL
        value: "sunilmukkath@elastictree.com"
      - key: SUPER_ADMIN_USERNAME
        value: "Sunil"
      - key: WORKSPACE_DOMAIN
        value: "elastictree.com"
